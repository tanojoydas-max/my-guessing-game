name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Pre-configure Android SDK Path
        run: |
          mkdir -p ~/.buildozer/android/platform

      - name: Compile Application Package
        run: |
          buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"
          ANDROID_SDK_PATH: "/home/runner/.buildozer/android/platform/android-sdk"
          ANDROID_NDK_PATH: "/home/runner/.buildozer/android/platform/android-ndk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: guessing-game-apk
          path: bin/*.apk
          
          
          
          
